<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Analyzer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;

    /* CENTER PERFECTLY */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card - ENLARGED */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    width: 450px;   /* increased size */
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Title */
.title {
    text-align: center;
    font-size: 26px;  /* bigger */
    font-weight: bold;
    margin-bottom: 25px;
}

/* Labels */
label {
    display: block;
    margin-top: 14px;
    font-size: 15px;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
}

input::placeholder {
    color: #ccc;
}

/* Button */
button {
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    background: linear-gradient(45deg, #6366f1, #3b82f6);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="card">

    <div class="title">AI Skin & Scalp Analyzer</div>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <label>Select Image</label>
        <input type="file" name="image" required>

        <label>Analysis Type</label>
        <select name="type">
            <option value="skin">Skin</option>
            <option value="scalp">Scalp</option>
        </select>

        <label>Enter City</label>
        <input type="text" name="city" placeholder="e.g. Bangalore" required>

        <button type="submit">Analyze Now</button>

    </form>

</div>

</body>
</html>
